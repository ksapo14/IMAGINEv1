name: imaginev1

services:
  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    environment:
      DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY:-}
      DEEPGRAM_MODEL: ${DEEPGRAM_MODEL:-flux-general-en}
      DEEPGRAM_EOT_THRESHOLD: ${DEEPGRAM_EOT_THRESHOLD:-0.7}
      DEEPGRAM_EOT_TIMEOUT_MS: ${DEEPGRAM_EOT_TIMEOUT_MS:-1500}
      DEEPGRAM_LANGUAGE_HINT: ${DEEPGRAM_LANGUAGE_HINT:-}
      CORS_ALLOW_ORIGIN_REGEX: ${CORS_ALLOW_ORIGIN_REGEX:-}
    ports:
      - "${BACKEND_PORT:-8010}:8010"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8010/health', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
        NEXT_PUBLIC_API_PORT: ${BACKEND_PORT:-8010}
    environment:
      NODE_ENV: production
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
